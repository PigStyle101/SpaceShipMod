[tips-and-tricks-item-description]
spaceship-mod-header=Start here for the core workflow of building and operating ships.
spaceship-mod-overview=Build a ship with [entity=spaceship-control-hub], [item=spaceship-flooring], and at least one [item=spaceship-docking-port].\n\nUse the control hub GUI to dock, take off, and manage your route schedule.\n\nWhen changing ship structure, let scanning finish before travel so references and docking state stay valid.
spaceship-mod-station-to-planet-transportation=From a station platform, move up a short step toward the [entity=space-platform-hub], then press __CONTROL__toggle-driving__ to enter it and trigger the platform-to-planet landing flow.
spaceship-mod-space-ship-gui=Click the [entity=spaceship-control-hub] to open ship controls, or press __CONTROL__open-gui__ while hovering it.
