[tips-and-tricks-item-category-name]
spaceship-mod=SpaceShip Mod Basics

[tips-and-tricks-item-description]
spaceship-mod-header=Build custom spaceships from [item=spaceship-flooring], [entity=spaceship-control-hub], [entity=spaceship-wall], and [item=thruster], and connect them to space platforms with [item=spaceship-docking-port]s.\n\nShips scan their own structure automatically and can be cloned between your home surface and space platforms to travel, dock at stations, and run automated schedules.\n\nWearing [item=spaceship-armor] lets you drop yourself or cargo down to a planet's surface, even before a station exists there. You will also need [item=spaceship-armor] equipped to leave a planet and return to space, so keep it on before boarding a cargo pod or rocket.
spaceship-mod-overview=Build a ship with [entity=spaceship-control-hub], [item=spaceship-flooring], and at least one [item=spaceship-docking-port].\n\nUse the control hub GUI to dock, take off, and manage your route schedule.\n\nWhen changing ship structure, let scanning finish before travel so references and docking state stay valid.
spaceship-mod-first-visit-to-new-planet=When visiting a planet that does not have a station yet, you cannot dock, so you will need to drop to the planet manually.\n\nOpen the [entity=spaceship-control-hub] GUI and click the "Drop player to Planet" button to send yourself down to the planet your ship is currently orbiting.
spaceship-mod-entering-spaceship-cockpit=To travel on a ship, walk to the cockpit window on the bottom right side of the [entity=spaceship-control-hub] and press __CONTROL__toggle-driving__ to sit down.\n\nWhile seated, open the hub's GUI (hover it and press __CONTROL__open-gui__), pick a destination from the dropdown, then click the Takeoff button.
spaceship-mod-station-to-planet-transportation=From a station platform, move up a short step toward the [entity=space-platform-hub], then press __CONTROL__toggle-driving__ to enter it and trigger the platform-to-planet landing flow.
spaceship-mod-space-ship-gui=Click the [entity=spaceship-control-hub] to open ship controls, or press __CONTROL__open-gui__ while hovering it.
spaceship-mod-creating-space-stations=Launch a [entity=space-platform-hub] into orbit of a planet to create a station there. The first platform to arrive in orbit of a planet is automatically renamed and set up as that planet's station, ready for your ships to dock at.\n\nOnly one station is allowed per planet. If a station already exists there, building another new platform in orbit of that planet will fail and the duplicate platform will be destroyed.
